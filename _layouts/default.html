<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
  <head>
    <meta charset="utf-8">
    <title>{{ page.title | escape }} - {{ site.title | escape }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {%- feed_meta -%}
    {%- seo -%}
    <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Jost:wght@400;500;600;700&family=Newsreader:opsz,ital,wght@6..72,0,300;6..72,0,400;6..72,0,500;6..72,1,400;6..72,1,500&display=swap" rel="stylesheet">

    {% include head-custom.html %}
  </head>
  <body>
    <header class="site-header" role="banner">
      {% include header.html %}
    </header>

    <main class="page-content" aria-label="Content">
      {{ content }}
    </main>

    <footer class="site-footer" role="contentinfo">
      {% include footer.html %}
    </footer>
    {% include consent-banner.html %}
  </body>
</html>
